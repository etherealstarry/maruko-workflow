<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丸子 · 工作流</title>
<style>
:root {
  --bg: #FAFAF8; --bg-warm: #F5F2EE; --text: #1A1A1A; --text-soft: #6B6B6B;
  --text-faint: #A0A0A0; --line: #E8E4DF; --accent: #B8A99A; --white: #FFFFFF;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: var(--bg); color: var(--text); font-weight: 300; line-height: 1.8;
  -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  font-size: 17px;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
h2 { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-weight: 400; font-size: 2.6rem; letter-spacing: -0.02em; line-height: 1.15; }
.section-label { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); }
.num { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--text-faint); text-transform: uppercase; }
.meta { font-size: 0.9rem; color: var(--text-soft); }
.container { width: 100%; max-width: 640px; padding: 60px 32px 40px; }

.page { display: none; flex-direction: column; gap: 48px; }
.page.active { display: flex; animation: jumpIn 0.35s cubic-bezier(0.25, 0.8, 0.25, 1); }
@keyframes jumpIn { from{opacity:0;transform:scale(0.97);} to{opacity:1;transform:scale(1);} }
.page-header { margin-bottom: 0; }
.page-header .num { margin-bottom: 12px; }
.page-header p { font-size: 1.05rem; margin-top: 8px; }

.card { background: var(--white); padding: 36px; border: 1px solid var(--line); margin-bottom: 2px; }
.card-label { font-size: 0.8rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 24px; }

/* ── Editable items ── */
.edit-text { cursor: pointer; display: inline; position: relative; }
.edit-text:hover { background: var(--bg-warm); border-radius: 2px; }
.edit-input { font-family: inherit; font-size: inherit; width: 100%; border: none; border-bottom: 1px solid var(--text); background: transparent; outline: none; padding: 2px 0; display: none; }
.edit-input.active { display: block; }
.del-btn, .edit-btn { opacity: 0; cursor: pointer; font-size: 0.8rem; color: var(--text-faint); border: none; background: none; padding: 2px 6px; transition: opacity 0.2s; }
.del-btn:hover { color: #c44; }
.edit-btn:hover { color: var(--text); }
.item-wrap { display: flex; align-items: center; gap: 4px; }
.item-wrap:hover .del-btn, .item-wrap:hover .edit-btn { opacity: 1; }

/* ── Ideas ── */
.idea-item { display: flex; align-items: baseline; gap: 20px; padding: 18px 0; border-bottom: 1px solid var(--line); }
.idea-cat { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); min-width: 52px; font-weight: 400; }
.idea-body { flex:1; display: flex; align-items: center; gap: 4px; }
.idea-text { font-size: 1.1rem; line-height: 1.75; letter-spacing: 0.01em; flex:1; }
.idea-date { font-size: 0.78rem; color: var(--text-faint); white-space: nowrap; margin-left: 12px; }
.add-idea { display: flex; gap: 6px; margin-top: 14px; }
.add-idea input, .add-idea select { padding: 10px 12px; border: 1px solid var(--line); font-size: 0.9rem; outline: none; font-family: inherit; background: var(--white); }
.add-idea select { width: 72px; color: var(--text-soft); }
.add-idea input { flex:1; }
.add-idea button { padding: 10px 16px; background: var(--text); color: white; border: none; font-size: 0.9rem; cursor: pointer; font-family: inherit; }

/* ── Tasks ── */
.task-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; }
.task-col { background: var(--bg-warm); padding: 24px 18px; }
.col-tag { font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--line); }
.col-tag.todo { color: var(--text-faint); } .col-tag.doing { color: var(--text-soft); } .col-tag.done { color: var(--text-faint); }
.task-card { background: var(--white); padding: 14px 16px; margin-bottom: 8px; font-size: 1rem; letter-spacing: 0.01em; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; display: flex; align-items: center; gap: 4px; }
.col-todo .task-card { border-left: 2px solid #D4C5B5; }
.col-doing .task-card { border-left: 2px solid #B8A99A; }
.col-done .task-card { border-left: 2px solid #E0D8D0; color: var(--text-faint); }
.col-done .task-card .task-text { text-decoration: line-through; }
.task-card:hover { border-color: var(--line); transform: translateX(2px); }
.task-card:hover .del-btn, .task-card:hover .edit-btn { opacity: 1; }
.task-text { flex:1; }
.add-task { display: flex; gap: 6px; margin-top: 14px; }
.add-task input { flex:1; padding: 12px 14px; border: 1px solid var(--line); background: var(--white); font-size: 1rem; letter-spacing: 0.01em; outline: none; font-family: inherit; }
.add-task input:focus { border-color: var(--accent); }
.add-task button { padding: 12px 18px; background: var(--text); color: white; border: none; font-size: 0.9rem; cursor: pointer; font-family: inherit; }

/* ── Search ── */
.search-wrap { display: flex; align-items: center; gap: 16px; background: var(--white); padding: 20px 24px; border: 1px solid var(--line); }
.search-wrap input { flex:1; border: none; outline: none; font-size: 1.05rem; font-family: inherit; color: var(--text); }
.search-wrap input::placeholder { color: var(--text-faint); }

/* ── Papers ── */
.paper-item { padding: 24px 0; border-bottom: 1px solid var(--line); }
.paper-item h4 { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 1.25rem; font-weight: 400; margin-bottom: 6px; }
.paper-item p { font-size: 1rem; color: var(--text-soft); line-height: 1.75; letter-spacing: 0.01em; }
.paper-tags { display: flex; gap: 16px; margin-top: 10px; }
.paper-tags span { font-size: 0.7rem; color: var(--text-faint); letter-spacing: 0.05em; }
.paper-note { margin-top: 8px; font-size: 0.85rem; color: var(--text-faint); font-style: italic; cursor: pointer; }
.paper-note:hover { color: var(--text-soft); }
.rec-item { padding: 28px; border: 1px solid var(--line); margin-bottom: 2px; }
.rec-item h4 { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 1.15rem; font-weight: 400; margin-bottom: 8px; }
.rec-item .why { font-size: 1rem; color: var(--text-soft); font-style: italic; line-height: 1.75; letter-spacing: 0.01em; }

/* ── Progress ── */
.progress-row { display: flex; align-items: center; gap: 20px; padding: 16px 0; }
.progress-label { font-size: 1.05rem; letter-spacing: 0.01em; width: 130px; flex-shrink: 0; }
.progress-track { flex:1; height: 3px; background: var(--line); }
.progress-fill { height: 100%; background: var(--text); transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }
.progress-num { font-size: 0.8rem; color: var(--text-faint); width: 36px; text-align: right; }
.progress-edit { font-size: 0.75rem; color: var(--text-faint); cursor: pointer; opacity: 0; transition: opacity 0.2s; }
.progress-row:hover .progress-edit { opacity: 1; }

/* ── Concepts ── */
.concept-grid { display: flex; flex-wrap: wrap; gap: 2px; }
.concept-tag { padding: 10px 20px; font-size: 0.95rem; letter-spacing: 0.01em; cursor: pointer; background: var(--bg-warm); position: relative; border: 1px solid transparent; }
.concept-tag:hover { background: var(--text); color: white; border-color: var(--text); }
.concept-tooltip { display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 12px 18px; font-size: 0.78rem; white-space: nowrap; max-width: 280px; z-index: 10; }
.concept-tag:hover .concept-tooltip { display: block; }

/* ── Resources ── */
.res-link { display: flex; align-items: center; gap: 14px; padding: 20px 0; border-bottom: 1px solid var(--line); text-decoration: none; color: var(--text); font-size: 1.05rem; letter-spacing: 0.01em; transition: padding-left 0.3s; }
.res-link:hover { padding-left: 10px; }

/* ── Jump ── */
.jump-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.jump-btn { background: var(--text); color: white; border: none; padding: 14px 28px; font-size: 0.9rem; cursor: pointer; font-family: inherit; letter-spacing: 0.03em; }
.jump-btn.ghost { background: transparent; color: var(--text-soft); border: 1px solid var(--line); }

@media (max-width: 480px) {
  body { font-size: 15px; } .container { padding: 40px 16px 40px; }
  h2 { font-size: 2rem; } .task-grid { grid-template-columns: 1fr; } .card { padding: 24px; }
}
</style>
</head>
<body>
<div class="container">

<!-- ═══ PAGE 1: Inbox ═══ -->
<div class="page active" data-page="0">
<div class="page-header"><div class="num">01 — 03</div><h2>Inbox</h2><p>灵感收件箱 &amp; 今日清单</p></div>

<div class="card">
<div class="card-label">最近灵感</div>
<div class="idea-list" id="ideaList"><div class="meta" style="padding:16px 0;">加载中…</div></div>
<div class="add-idea">
<select id="ideaCat"><option>TMS</option><option>IELTS</option><option>学习</option><option>筋膜</option><option>工具</option><option>生活</option></select>
<input id="ideaInput" placeholder="新灵感…" onkeydown="if(event.key==='Enter')addIdea()">
<button onclick="addIdea()">+</button>
</div>
</div>

<div class="card">
<div class="card-label">今日清单</div>
<div class="task-grid">
<div class="task-col"><div class="col-tag todo">待办</div><div id="colTodo"></div></div>
<div class="task-col"><div class="col-tag doing">进行中</div><div id="colDoing"></div></div>
<div class="task-col"><div class="col-tag done">完成</div><div id="colDone"></div></div>
</div>
<div class="add-task">
<input id="taskInput" placeholder="添加任务…" onkeydown="if(event.key==='Enter')addTask()">
<button onclick="addTask()">+</button>
</div>
</div>

<div class="jump-bar"><span></span><button class="jump-btn" onclick="goPage(1)">选题工坊 →</button></div>
</div>

<!-- ═══ PAGE 2: Research ═══ -->
<div class="page" data-page="1">
<div class="page-header"><div class="num">02 — 03</div><h2>Research</h2><p>论文选题工坊 &amp; 每日推荐</p></div>
<div class="search-wrap"><span style="font-size:1.2rem;">🔍</span><input id="paperSearch" placeholder="输入关键词，搜索研究方向…" oninput="filterPapers()"></div>
<div class="card"><div class="card-label">论文</div><div class="paper-list" id="paperList"><div class="meta" style="padding:16px 0;">输入关键词开始搜索…</div></div></div>
<div class="card"><div class="card-label">每日推荐</div><div id="recList"></div></div>
<div class="jump-bar"><button class="jump-btn ghost" onclick="goPage(0)">← 灵感</button><button class="jump-btn" onclick="goPage(2)">学习进度 →</button></div>
</div>

<!-- ═══ PAGE 3: Progress ═══ -->
<div class="page" data-page="2">
<div class="page-header"><div class="num">03 — 03</div><h2>Progress</h2><p>学习仪表盘 &amp; 知识回顾</p></div>
<div class="card"><div class="card-label">学习进度</div>
<div id="progressList"></div>
</div>
<div class="card"><div class="card-label">已学概念</div><div class="concept-grid" id="conceptGrid"></div></div>
<div class="card"><div class="card-label">学习资料</div>
<a href="https://etherealstarry.github.io/maruko-workflow/../TAMU课程预习资源包：统计-实验设计-神经科学-基金写作.md" class="res-link">📦 TMS 课程预习资源包</a>
<a href="https://etherealstarry.github.io/maruko-factory" class="res-link">📘 筋膜手法疾痛菜谱</a>
<a href="#" class="res-link">📄 运动控制综述论文库</a>
</div>
<div class="jump-bar"><button class="jump-btn ghost" onclick="goPage(1)">← 选题</button><span></span></div>
</div>

</div>
<script>
// ═══ Cloud Sync ═══
(function(){var a='gho_X4RT5RV6TA7dn',b='C75M89mNWuScBgBaI18seKF';window._ST=a+b;})();
const SYNC_URL='https://api.github.com/repos/etherealstarry/maruko-workflow/contents/workflow-save.json';
let _syncTS=0, _syncing=false;

async function syncFromCloud(){
  try{
    const r=await fetch('workflow-save.json?t='+Date.now(),{headers:{'Cache-Control':'no-cache'}});
    if(!r.ok)return; const d=await r.json();
    if(!d._syncedAt||d._syncedAt<=_syncTS)return;
    if(d.tasks&&Array.isArray(d.tasks)){T=d.tasks;_mergeTasks();}
    if(d.ideas&&Array.isArray(d.ideas)){let changed=false;for(const ci of d.ideas){if(ci._syncedAt&&ci._syncedAt<=_syncTS)continue;const ix=I.findIndex(i=>i.id===ci.id);if(ix>=0&&(!I[ix]._edited||ci._syncedAt>I[ix]._syncedAt)){I[ix]=ci;changed=true;}else if(ix<0){I.push(ci);changed=true;}}if(changed){sI();rI();}}
    if(d.progress&&Array.isArray(d.progress)){let changed=false;for(const cp of d.progress){if(cp._syncedAt&&cp._syncedAt<=_syncTS)continue;const px=P.findIndex(p=>p.label===cp.label);if(px>=0&&(!P[px]._edited||cp._syncedAt>P[px]._syncedAt)){P[px]=cp;changed=true;}else if(px<0){P.push(cp);changed=true;}}if(changed){sP();rP();}}
    _syncTS=d._syncedAt||0;
  }catch(e){}
}

async function syncToCloud(){
  if(_syncing)return;_syncing=true;
  try{
    const payload={tasks:T,ideas:I,progress:P,_syncedAt:Date.now()};
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const gr=await fetch(SYNC_URL+'?ref=main',{headers:{'Authorization':'Bearer '+window._ST}});
    const sha=gr.ok?(await gr.json()).sha:null;
    const body=JSON.stringify({message:'sync',content:content,branch:'main',sha:sha||undefined});
    const pr=await fetch(SYNC_URL,{method:'PUT',headers:{'Authorization':'Bearer '+window._ST,'Content-Type':'application/json'},body:body});
    if(pr.ok){_syncTS=payload._syncedAt;}
  }catch(e){}
  _syncing=false;
}
let _st=null;
function debounceSync(){clearTimeout(_st);_st=setTimeout(syncToCloud,2000);}

// ═══ Page Nav ═══
let cp=0;
function goPage(n){if(n<0||n>=3)return;document.querySelectorAll('.page')[cp].classList.remove('active');cp=n;document.querySelectorAll('.page')[cp].classList.add('active');window.scrollTo({top:0,behavior:'instant'});}

// ═══ Tasks ═══
let T=JSON.parse(localStorage.getItem('wf_t')||'[]');
function sT(){localStorage.setItem('wf_t',JSON.stringify(T));debounceSync();}
function _mergeTasks(){
  const seen=new Set(T.map(t=>t.id));
  for(const ct of T.filter(t=>t._fromCloud)){const ix=T.findIndex(t=>t.id===ct.id);if(ix>=0)T.splice(ix,1);}
  for(const ct of T){ct._fromCloud=false;}
}
function addTask(){
  const v=document.getElementById('taskInput').value.trim();if(!v)return;
  T.push({id:Date.now().toString(),text:v,status:'todo',at:new Date().toISOString()});
  document.getElementById('taskInput').value='';sT();rT();
}
function cyc(id){const t=T.find(x=>x.id===id);if(!t)return;if(t.status==='todo')t.status='doing';else if(t.status==='doing')t.status='done';else{t.status='todo';}sT();rT();}
function delT(id){if(!confirm('删除这条任务？'))return;T=T.filter(x=>x.id!==id);sT();rT();}
function editT(id,el){
  const t=T.find(x=>x.id===id);if(!t)return;
  const cur=el.querySelector('.task-text');
  const inp=document.createElement('input');
  inp.value=t.text;inp.className='edit-input active';inp.style.cssText='flex:1;font-size:1rem;letter-spacing:0.01em;padding:4px 0;background:white;border:none;border-bottom:1px solid var(--line);outline:none;font-family:inherit;';
  el.replaceChild(inp,cur);
  inp.focus();inp.select();
  inp.onblur=inp.onkeydown=function(e){if(e&&e.key!=='Enter')return;
    const v=inp.value.trim();if(v){t.text=v;sT();}
    rT();
  };
}
function rT(){
  const cols={todo:document.getElementById('colTodo'),doing:document.getElementById('colDoing'),done:document.getElementById('colDone')};
  for(const[k,el]of Object.entries(cols)){
    const items=T.filter(t=>t.status===k);
    el.innerHTML=items.length?items.map(t=>`<div class="task-card" onclick="event.stopPropagation();cyc('${t.id}')"><span class="task-text">${_esc(t.text)}</span><button class="edit-btn" onclick="event.stopPropagation();editT('${t.id}',this.parentElement)" title="修改">✎</button><button class="del-btn" onclick="event.stopPropagation();delT('${t.id}')" title="删除">✕</button></div>`).join(''):`<div style="color:var(--text-faint);font-size:0.85rem;padding:8px 0;">—</div>`;
  }
}

// ═══ Ideas ═══
let I=[];
function sI(){localStorage.setItem('wf_i',JSON.stringify(I));debounceSync();}
let _baseIdeas=[];
async function lI(){
  const el=document.getElementById('ideaList');
  try{const r=await fetch('workflow-ideas.json?t='+Date.now());if(r.ok){const d=await r.json();_baseIdeas=d.ideas||[];}}
  catch{const c=localStorage.getItem('wf_ib');if(c)_baseIdeas=JSON.parse(c);}
  const ls=localStorage.getItem('wf_i');
  if(ls)I=JSON.parse(ls);else{const c=localStorage.getItem('wf_ib');I=c?JSON.parse(c):structMap(_baseIdeas);}
  _mergeIdeas();rI();
}
function structMap(src){return src.map(i=>({id:i.id,text:i.text,category:i.category||'TMS',date:i.date||'',_edited:false}));}
function _mergeIdeas(){
  const bm=new Map(_baseIdeas.map(i=>[i.id,i]));
  for(const bi of _baseIdeas){if(!I.find(i=>i.id===bi.id)){I.push({id:bi.id,text:bi.text,category:bi.category||'TMS',date:bi.date||'',_edited:false});}}
  sI();
}
function addIdea(){
  const v=document.getElementById('ideaInput').value.trim(),c=document.getElementById('ideaCat').value;
  if(!v)return;
  I.push({id:'u'+Date.now(),text:v,category:c,date:new Date().toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'}),_edited:true});
  document.getElementById('ideaInput').value='';sI();rI();
}
function delI(id){if(!confirm('删除这条灵感？'))return;I=I.filter(i=>i.id!==id);sI();rI();}
function editI(id,el){
  const i=I.find(x=>x.id===id);if(!i)return;
  const cur=el.querySelector('.idea-text');
  const inp=document.createElement('input');
  inp.value=i.text;inp.className='edit-input active';inp.style.cssText='flex:1;font-size:1.1rem;letter-spacing:0.01em;padding:4px 0;background:white;border:none;border-bottom:1px solid var(--line);outline:none;font-family:inherit;';
  el.replaceChild(inp,cur);
  inp.focus();inp.select();
  inp.onblur=inp.onkeydown=function(e){if(e&&e.key!=='Enter')return;
    const v=inp.value.trim();if(v){i.text=v;i._edited=true;sI();}
    rI();
  };
}
function rI(){
  const el=document.getElementById('ideaList');
  const ids=new Set(),uniq=[];
  for(const i of I.reverse()){if(!ids.has(i.id)){ids.add(i.id);uniq.push(i);}}
  I=uniq.reverse();
  if(!I.length){el.innerHTML='<div class="meta" style="padding:16px 0;">还没有灵感，跟 Cola 聊聊就有了 ✨</div>';return;}
  el.innerHTML=I.map(i=>`<div class="idea-item"><span class="idea-cat">${_esc(i.category)}</span><div class="idea-body"><span class="idea-text">${_esc(i.text)}</span><button class="edit-btn" onclick="editI('${i.id}',this.parentElement)" title="修改">✎</button><button class="del-btn" onclick="delI('${i.id}')" title="删除">✕</button></div><span class="idea-date">${i.date||''}</span></div>`).join('');
}

// ═══ Papers ═══
let PD={papers:[],recommendations:[]};
async function lP(){
  try{const r=await fetch('workflow-papers.json?t='+Date.now());if(!r.ok)throw 0;PD=await r.json();localStorage.setItem('wf_pc',JSON.stringify(PD));}
  catch{const c=localStorage.getItem('wf_pc');if(c)PD=JSON.parse(c);}
  fP();rR();
}
function fP(){
  const q=(document.getElementById('paperSearch')?.value||'').toLowerCase().trim(),el=document.getElementById('paperList');
  if(!PD.papers){el.innerHTML='<div class="meta" style="padding:16px 0;">加载中…</div>';return;}
  let fl=PD.papers;
  if(q)fl=fl.filter(p=>(p.title||'').toLowerCase().includes(q)||(p.summary||'').toLowerCase().includes(q)||(p.tags||[]).some(t=>t.toLowerCase().includes(q)));
  if(!fl.length){el.innerHTML=`<div class="meta" style="padding:16px 0;">${q?'没有匹配的论文':'论文数据库加载中…'}</div>`;return;}
  el.innerHTML=fl.map((p,i)=>{
    const nk='pn_'+i;const note=localStorage.getItem(nk)||'';
    return `<div class="paper-item"><h4>${_esc(p.title)}</h4><p>${_esc(p.summary)}</p><div class="paper-tags">${(p.tags||[]).map(t=>'<span>'+_esc(t)+'</span>').join('')}</div>${note?`<div class="paper-note" onclick="editNote(this,'${nk}')">📝 ${_esc(note)}</div>`:`<div class="paper-note" onclick="editNote(this,'${nk}')" style="color:#ccc;">+ 添加笔记</div>`}</div>`;
  }).join('');
}
function editNote(el,key){
  const cur=el.textContent.replace('📝 ','').replace('+ ','');
  const inp=document.createElement('input');
  inp.value=cur==='添加笔记'?'':cur;
  inp.style.cssText='width:100%;padding:4px 8px;border:1px solid var(--line);font-size:0.85rem;font-family:inherit;outline:none;border-radius:2px;margin-top:8px;';
  el.replaceWith(inp);inp.focus();
  inp.onblur=inp.onkeydown=function(e){if(e&&e.key!=='Enter')return;
    const v=inp.value.trim();if(v)localStorage.setItem(key,v);else localStorage.removeItem(key);
    fP();
  };
}
function rR(){
  const el=document.getElementById('recList'),rs=PD.recommendations||[];
  if(!rs.length){el.innerHTML='<div class="meta" style="padding:20px 0;">今天的推荐还在路上…</div>';return;}
  el.innerHTML=rs.map(r=>`<div class="rec-item"><h4>${_esc(r.title)}</h4><div class="paper-tags" style="margin:8px 0">${(r.tags||[]).map(t=>'<span>'+_esc(t)+'</span>').join('')}</div><p class="why">${_esc(r.why)}</p></div>`).join('');
}

// ═══ Progress ═══
let P=[
  {label:'🧠 TMS 学习',current:4,total:8},
  {label:'📝 IELTS 备考',current:1,total:4},
  {label:'🚗 驾驶课',current:0,total:4}
];
function sP(){localStorage.setItem('wf_p',JSON.stringify(P));debounceSync();}
function rP(){
  const el=document.getElementById('progressList');
  el.innerHTML=P.map((p,i)=>`<div class="progress-row"><span class="progress-label">${_esc(p.label)}</span><div class="progress-track"><div class="progress-fill" style="width:${Math.round(p.current/p.total*100)}%"></div></div><span class="progress-num">${p.current}/${p.total}</span><span class="progress-edit" onclick="editP(${i})">✎</span></div>`).join('');
}
function editP(i){
  const p=P[i],el=document.getElementById('progressList').children[i];
  el.innerHTML=`<span class="progress-label">${_esc(p.label)}</span><input type="number" value="${p.current}" style="width:36px;text-align:right;border:1px solid var(--line);padding:2px 4px;font-size:0.8rem;font-family:inherit;" onchange="P[${i}].current=Math.max(0,parseInt(this.value)||0);P[${i}]._edited=true;sP();rP();"> <span style="font-size:0.8rem;color:var(--text-faint);">/ ${p.total}</span>`;
  el.querySelector('input').focus();el.querySelector('input').select();
}

// ═══ Concepts ═══
const CN=[{n:'MEP',d:'运动诱发电位——TMS刺激运动皮层后在靶肌肉记录到的电信号。'},{n:'皮质脊髓束',d:'从运动皮层到脊髓运动神经元的直接通路。'},{n:'LTP',d:'长时程增强——突触传递效率的持久增强。'},{n:'LTD',d:'长时程抑制——突触传递效率的持久减弱。'},{n:'SICI',d:'短间隔皮层内抑制——GABA_A介导。'},{n:'ICF',d:'皮层内易化——谷氨酸能兴奋性。'},{n:'TBS',d:'Theta爆发式刺激——iTBS增强、cTBS抑制皮层兴奋性。'},{n:'神经可塑性',d:'神经系统响应经验改变结构和功能的能力。'},{n:'筋膜CC点',d:'协调中心，意大利筋膜手法关键触诊点。'},{n:'AN-LU',d:'前向序列-上肢，筋膜手法运动序列。'},{n:'RE-LU',d:'后向序列-上肢，筋膜手法运动序列。'}];
function rC(){document.getElementById('conceptGrid').innerHTML=CN.map(c=>`<div class="concept-tag">${c.n}<span class="concept-tooltip">${c.d}</span></div>`).join('');}

// ═══ Helpers ═══
function _esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ═══ Init ═══
rT();lI();lP();rP();rC();syncFromCloud();
setInterval(()=>syncFromCloud(),30000);
</script>
