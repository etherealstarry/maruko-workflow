<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丸子 · 工作流</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF8;
  --bg-warm: #F5F2EE;
  --text: #1A1A1A;
  --text-soft: #6B6B6B;
  --text-faint: #A0A0A0;
  --line: #E8E4DF;
  --accent: #B8A99A;
  --white: #FFFFFF;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', sans-serif;
  background: var(--bg); color: var(--text);
  font-weight: 300; line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
}

body::before {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.serif { font-family: 'Playfair Display', Georgia, serif; }
.serif-i { font-family: 'Playfair Display', Georgia, serif; font-style: italic; }

.container { width: 100%; max-width: 680px; padding: 48px 24px 120px; }

/* ── Pages ── */
.page { display: none; flex-direction: column; gap: 36px; animation: fadeIn 0.5s cubic-bezier(0.16,1,0.3,1); }
.page.active { display: flex; }
@keyframes fadeIn { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }

/* ── Page header ── */
.page-header { margin-bottom: 4px; }
.page-header .num {
  font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-faint); margin-bottom: 8px;
}
.page-header h2 { font-size: 1.8rem; font-weight: 600; font-style: italic; }
.page-header p { font-size: 0.85rem; color: var(--text-soft); margin-top: 4px; }

/* ── Cards ── */
.card { background: var(--white); padding: 28px; border: 1px solid var(--line); }
.card-label {
  font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text-faint); margin-bottom: 20px;
}

/* ── Ideas ── */
.idea-list { display: flex; flex-direction: column; gap: 2px; }
.idea-item {
  display: flex; align-items: baseline; gap: 16px;
  padding: 14px 0; border-bottom: 1px solid var(--line);
  transition: padding-left 0.25s;
}
.idea-item:hover { padding-left: 8px; }
.idea-cat {
  font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-faint); min-width: 48px;
}
.idea-text { font-size: 0.9rem; flex: 1; line-height: 1.5; }
.idea-date { font-size: 0.7rem; color: var(--text-faint); white-space: nowrap; }

/* ── Tasks ── */
.task-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; }
.task-col { background: var(--bg-warm); padding: 20px 16px; }
.col-tag {
  font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--line);
}
.col-tag.todo { color: var(--text-faint); }
.col-tag.doing { color: var(--text-soft); }
.col-tag.done { color: var(--text-faint); }

.task-card {
  background: var(--white); padding: 12px 14px; margin-bottom: 8px;
  font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
  border: 1px solid transparent;
}
.col-todo .task-card { border-left: 2px solid #D4C5B5; }
.col-doing .task-card { border-left: 2px solid #B8A99A; }
.col-done .task-card { border-left: 2px solid #E0D8D0; text-decoration: line-through; color: var(--text-faint); }
.task-card:hover { border-color: var(--line); }

.add-task { display: flex; gap: 6px; margin-top: 12px; }
.add-task input {
  flex: 1; padding: 10px 12px; border: 1px solid var(--line); background: var(--white);
  font-size: 0.8rem; outline: none; font-family: inherit; transition: border-color 0.2s;
}
.add-task input:focus { border-color: var(--accent); }
.add-task button {
  padding: 10px 16px; background: var(--text); color: white; border: none;
  font-size: 0.8rem; cursor: pointer; font-family: inherit;
  transition: opacity 0.2s;
}
.add-task button:hover { opacity: 0.8; }

/* ── Search ── */
.search-wrap {
  display: flex; align-items: center; gap: 12px;
  background: var(--white); padding: 16px 20px; border: 1px solid var(--line);
}
.search-wrap input {
  flex: 1; border: none; outline: none; font-size: 0.9rem; font-family: inherit;
  color: var(--text);
}
.search-wrap input::placeholder { color: var(--text-faint); }

/* ── Papers ── */
.paper-list { display: flex; flex-direction: column; gap: 2px; }
.paper-item {
  padding: 20px 0; border-bottom: 1px solid var(--line);
  transition: padding-left 0.25s;
}
.paper-item:hover { padding-left: 8px; }
.paper-item h4 { font-size: 0.9rem; font-weight: 600; font-style: italic; margin-bottom: 4px; }
.paper-item p { font-size: 0.8rem; color: var(--text-soft); }
.paper-tags { display: flex; gap: 12px; margin-top: 8px; }
.paper-tags span { font-size: 0.65rem; color: var(--text-faint); letter-spacing: 0.05em; }

/* ── Recommendations ── */
.rec-item {
  padding: 24px; border: 1px solid var(--line);
  margin-bottom: 2px; transition: padding-left 0.25s;
}
.rec-item:hover { padding-left: 32px; }
.rec-item h4 { font-size: 0.95rem; font-weight: 600; font-style: italic; margin-bottom: 6px; }
.rec-item .why { font-size: 0.8rem; color: var(--text-soft); font-style: italic; }

/* ── Progress ── */
.progress-row {
  display: flex; align-items: center; gap: 16px; padding: 12px 0;
}
.progress-label { font-size: 0.85rem; width: 120px; flex-shrink: 0; }
.progress-track { flex: 1; height: 2px; background: var(--line); }
.progress-fill { height: 100%; background: var(--text); transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }
.progress-num { font-size: 0.75rem; color: var(--text-faint); width: 32px; text-align: right; }

/* ── Concepts ── */
.concept-grid { display: flex; flex-wrap: wrap; gap: 2px; }
.concept-tag {
  padding: 8px 16px; font-size: 0.78rem; cursor: pointer;
  background: var(--bg-warm); transition: background 0.2s; position: relative;
  border: 1px solid transparent;
}
.concept-tag:hover { background: var(--text); color: white; border-color: var(--text); }
.concept-tooltip {
  display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
  background: var(--text); color: white; padding: 10px 16px; font-size: 0.72rem;
  white-space: nowrap; max-width: 260px; z-index: 10;
  font-family: 'Inter', -apple-system, sans-serif; font-style: normal;
}
.concept-tag:hover .concept-tooltip { display: block; }

/* ── Resources ── */
.res-link {
  display: flex; align-items: center; gap: 12px; padding: 16px 0;
  border-bottom: 1px solid var(--line); text-decoration: none; color: var(--text);
  font-size: 0.85rem; transition: padding-left 0.25s;
}
.res-link:hover { padding-left: 8px; }

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: center; align-items: center; gap: 32px;
  padding: 16px 24px; background: rgba(250,250,248,0.92);
  backdrop-filter: blur(16px); border-top: 1px solid var(--line); z-index: 100;
}
.nav-btn {
  background: none; border: none; font-size: 0.78rem; cursor: pointer;
  font-family: 'Inter', -apple-system, sans-serif; letter-spacing: 0.05em;
  color: var(--text-soft); transition: color 0.2s;
}
.nav-btn:hover { color: var(--text); }
.nav-btn:disabled { color: var(--text-faint); cursor: default; }
.nav-dots { display: flex; gap: 8px; }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--line); transition: all 0.3s; }
.nav-dot.active { background: var(--text); width: 20px; border-radius: 6px; }

/* ── Mobile ── */
@media (max-width: 480px) {
  .container { padding: 32px 16px 120px; }
  .task-grid { grid-template-columns: 1fr; }
  .progress-row { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="container">

  <!-- ═══════ PAGE 1 ═══════ -->
  <div class="page active" data-page="0">
    <div class="page-header">
      <div class="num">01 / 03</div>
      <h2 class="serif-i">Inbox</h2>
      <p>灵感收件箱 &amp; 今日清单</p>
    </div>

    <div class="card">
      <div class="card-label">最近灵感</div>
      <div class="idea-list" id="ideaList"><div style="color:var(--text-faint);font-size:0.8rem;">加载中…</div></div>
    </div>

    <div class="card">
      <div class="card-label">今日清单</div>
      <div class="task-grid">
        <div class="task-col">
          <div class="col-tag todo">待办</div>
          <div id="colTodo"></div>
          <div class="add-task">
            <input id="taskInput" placeholder="添加任务…" onkeydown="if(event.key==='Enter')addTask()">
            <button onclick="addTask()">+</button>
          </div>
        </div>
        <div class="task-col">
          <div class="col-tag doing">进行中</div>
          <div id="colDoing"></div>
        </div>
        <div class="task-col">
          <div class="col-tag done">完成</div>
          <div id="colDone"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════ PAGE 2 ═══════ -->
  <div class="page" data-page="1">
    <div class="page-header">
      <div class="num">02 / 03</div>
      <h2 class="serif-i">Research</h2>
      <p>论文选题工坊 &amp; 每日推荐</p>
    </div>

    <div class="search-wrap">
      <span style="font-size:1.1rem;">🔍</span>
      <input id="paperSearch" placeholder="输入关键词，搜索研究方向…" oninput="filterPapers()">
    </div>

    <div class="card">
      <div class="card-label">论文</div>
      <div class="paper-list" id="paperList"><div style="color:var(--text-faint);font-size:0.8rem;">输入关键词开始搜索…</div></div>
    </div>

    <div style="margin-top:4px;">
      <div class="card-label" style="margin-bottom:12px;">每日推荐</div>
      <div id="recList"></div>
    </div>
  </div>

  <!-- ═══════ PAGE 3 ═══════ -->
  <div class="page" data-page="2">
    <div class="page-header">
      <div class="num">03 / 03</div>
      <h2 class="serif-i">Progress</h2>
      <p>学习仪表盘 &amp; 知识回顾</p>
    </div>

    <div class="card">
      <div class="card-label">学习进度</div>
      <div class="progress-row">
        <span class="progress-label">🧠 TMS 学习</span>
        <div class="progress-track"><div class="progress-fill" style="width:50%"></div></div>
        <span class="progress-num">4/8</span>
      </div>
      <div class="progress-row">
        <span class="progress-label">📝 IELTS 备考</span>
        <div class="progress-track"><div class="progress-fill" style="width:25%"></div></div>
        <span class="progress-num">1/4</span>
      </div>
      <div class="progress-row">
        <span class="progress-label">🚗 驾驶课</span>
        <div class="progress-track"><div class="progress-fill" style="width:0%"></div></div>
        <span class="progress-num">0/4</span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">已学概念</div>
      <div class="concept-grid" id="conceptGrid"></div>
    </div>

    <div class="card">
      <div class="card-label">学习资料</div>
      <a href="#" class="res-link">📦 TMS 课程预习资源包</a>
      <a href="#" class="res-link">📘 筋膜手法疾痛菜谱</a>
      <a href="#" class="res-link">📄 运动控制综述论文库</a>
    </div>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn" id="btnPrev" onclick="goPage(-1)" disabled>← Prev</button>
  <div class="nav-dots" id="navDots">
    <span class="nav-dot active"></span><span class="nav-dot"></span><span class="nav-dot"></span>
  </div>
  <button class="nav-btn" id="btnNext" onclick="goPage(1)">Next →</button>
</nav>

<script>
// ── Page nav ──
let cp=0; const TP=3;
function goPage(d){
  const n=cp+d; if(n<0||n>=TP)return;
  document.querySelectorAll('.page')[cp].classList.remove('active');
  document.querySelectorAll('.nav-dot')[cp].classList.remove('active');
  cp=n;
  document.querySelectorAll('.page')[cp].classList.add('active');
  document.querySelectorAll('.nav-dot')[cp].classList.add('active');
  document.getElementById('btnPrev').disabled=cp===0;
  document.getElementById('btnNext').disabled=cp===TP-1;
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Tasks ──
let T=JSON.parse(localStorage.getItem('wf_tasks_v3')||'[]');
function sT(){localStorage.setItem('wf_tasks_v3',JSON.stringify(T));}
function addTask(){
  const v=document.getElementById('taskInput').value.trim(); if(!v)return;
  T.push({id:Date.now().toString(),text:v,status:'todo',at:new Date().toISOString()});
  document.getElementById('taskInput').value=''; sT(); rT();
}
function cyc(id){
  const t=T.find(x=>x.id===id); if(!t)return;
  if(t.status==='todo')t.status='doing'; else if(t.status==='doing')t.status='done'; else{T=T.filter(x=>x.id!==id);}
  sT(); rT();
}
function rT(){
  const c={todo:document.getElementById('colTodo'),doing:document.getElementById('colDoing'),done:document.getElementById('colDone')};
  for(const[k,el]of Object.entries(c)){
    const items=T.filter(t=>t.status===k);
    el.innerHTML=items.length?items.map(t=>`<div class="task-card" onclick="cyc('${t.id}')">${t.text}</div>`).join(''):`<div style="color:var(--text-faint);font-size:0.75rem;padding:8px 0;">—</div>`;
  }
}

// ── Ideas ──
async function lI(){
  const el=document.getElementById('ideaList');
  try{const r=await fetch('workflow-ideas.json?t='+Date.now());if(!r.ok)throw 0;
    const d=await r.json();localStorage.setItem('wf_ic',JSON.stringify(d));rI(d.ideas);}
  catch{const c=localStorage.getItem('wf_ic');if(c)rI(JSON.parse(c).ideas);else el.innerHTML='<div style="color:var(--text-faint);font-size:0.8rem;">还没有灵感 ✨</div>';}
}
function rI(ideas){
  const el=document.getElementById('ideaList');
  if(!ideas||!ideas.length){el.innerHTML='<div style="color:var(--text-faint);font-size:0.8rem;">还没有灵感，跟 Cola 聊聊就有了 ✨</div>';return;}
  el.innerHTML=ideas.map(i=>`<div class="idea-item"><span class="idea-cat">${i.category}</span><span class="idea-text">${i.text}</span><span class="idea-date">${i.date}</span></div>`).join('');
}

// ── Papers ──
let PD={papers:[],recommendations:[]};
async function lP(){
  try{const r=await fetch('workflow-papers.json?t='+Date.now());if(!r.ok)throw 0;
    PD=await r.json();localStorage.setItem('wf_pc',JSON.stringify(PD));}
  catch{const c=localStorage.getItem('wf_pc');if(c)PD=JSON.parse(c);}
  fP(); rR();
}
function fP(){
  const q=(document.getElementById('paperSearch')?.value||'').toLowerCase().trim();
  const el=document.getElementById('paperList');
  if(!PD.papers){el.innerHTML='<div style="color:var(--text-faint);font-size:0.8rem;">加载中…</div>';return;}
  let fl=PD.papers;
  if(q)fl=fl.filter(p=>(p.title||'').toLowerCase().includes(q)||(p.summary||'').toLowerCase().includes(q)||(p.tags||[]).some(t=>t.toLowerCase().includes(q)));
  if(!fl.length){el.innerHTML=`<div style="color:var(--text-faint);font-size:0.8rem;">${q?'没有匹配的论文':'论文数据库加载中…'}</div>`;return;}
  el.innerHTML=fl.map(p=>`<div class="paper-item"><h4 class="serif-i">${p.title}</h4><p>${p.summary}</p><div class="paper-tags">${(p.tags||[]).map(t=>'<span>'+t+'</span>').join('')}</div></div>`).join('');
}
function rR(){
  const el=document.getElementById('recList');
  const rs=PD.recommendations||[];
  if(!rs.length){el.innerHTML='<div style="color:var(--text-faint);font-size:0.8rem;padding:20px;">今天的推荐还在路上…</div>';return;}
  el.innerHTML=rs.map(r=>`<div class="rec-item"><h4 class="serif-i">${r.title}</h4><div class="paper-tags" style="margin:6px 0">${(r.tags||[]).map(t=>'<span>'+t+'</span>').join('')}</div><p class="why">${r.why}</p></div>`).join('');
}

// ── Concepts ──
const CN=[
  {n:'MEP',d:'运动诱发电位——TMS刺激运动皮层后在靶肌肉记录到的电信号。'},
  {n:'皮质脊髓束',d:'从运动皮层到脊髓运动神经元的直接通路，控制随意运动。'},
  {n:'LTP',d:'长时程增强——突触传递效率的持久增强，学习和记忆的细胞基础。'},
  {n:'LTD',d:'长时程抑制——突触传递效率的持久减弱。'},
  {n:'SICI',d:'短间隔皮层内抑制——反映GABA_A介导的皮层抑制。'},
  {n:'ICF',d:'皮层内易化——反映谷氨酸能兴奋性。'},
  {n:'TBS',d:'Theta爆发式刺激——iTBS增强、cTBS抑制皮层兴奋性。'},
  {n:'神经可塑性',d:'神经系统响应经验改变结构和功能的能力。'},
  {n:'筋膜CC点',d:'协调中心，意大利筋膜手法中的关键触诊点。'},
  {n:'AN-LU',d:'前向序列-上肢，筋膜手法特定运动序列。'},
  {n:'RE-LU',d:'后向序列-上肢，筋膜手法特定运动序列。'},
];
function rC(){
  document.getElementById('conceptGrid').innerHTML=CN.map(c=>`<div class="concept-tag">${c.n}<span class="concept-tooltip">${c.d}</span></div>`).join('');
}

// ── Init ──
rT(); lI(); lP(); rC();
</script>
</body>
</html>
