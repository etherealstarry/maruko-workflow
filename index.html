<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丸子工作流 · 三页全能看板</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAF8F5;
  --text: #3A3025;
  --accent: #C8956C;
  --accent-light: #e8d5c5;
  --card-bg: #FFF;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-hover: 0 2px 12px rgba(0,0,0,0.1);
  --border: #EDE8E2;
  --text-secondary: #8C8278;
  --amber: #E8A838;
  --blue: #5B8DB8;
  --green: #7BA87B;
  --amber-bg: #fef7ec;
  --blue-bg: #eef5fa;
  --green-bg: #edf7ed;
  --radius: 10px;
  --radius-sm: 6px;
}

body {
  font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* Header */
header {
  text-align: center;
  padding: 32px 16px 8px;
}
header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
}
header .subtitle {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* Tab Navigation */
.tab-nav {
  display: flex;
  justify-content: center;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  padding: 12px 0 16px;
}
.tab-pill {
  padding: 8px 22px;
  border-radius: 24px;
  border: 1.5px solid var(--border);
  background: var(--card-bg);
  color: var(--text-secondary);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  user-select: none;
  white-space: nowrap;
}
.tab-pill:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-1px);
}
.tab-pill.active {
  background: var(--accent);
  color: #FFF;
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(200,149,108,0.3);
  transform: scale(1.04);
}
.tab-pill:active {
  transform: scale(0.97);
}

/* Tab panels */
.tab-panel {
  display: none;
  animation: fadeIn 0.3s ease;
}
.tab-panel.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

/* Section titles */
.section-title {
  font-size: 1.05rem;
  font-weight: 600;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
}

/* Cards */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.25s ease;
}
.card:hover {
  box-shadow: var(--shadow-hover);
}

/* Idea cards */
.idea-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
  animation: slideIn 0.35s ease both;
}
.idea-card:nth-child(1) { animation-delay: 0s; }
.idea-card:nth-child(2) { animation-delay: 0.05s; }
.idea-card:nth-child(3) { animation-delay: 0.1s; }
.idea-card:nth-child(4) { animation-delay: 0.15s; }
.idea-card:nth-child(5) { animation-delay: 0.2s; }

.badge {
  font-size: 0.72rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.badge-ielts { background: #f0e6f6; color: #7b5ea7; }
.badge-tms { background: #dceefb; color: #4a7fb5; }
.badge-life { background: #fef1e0; color: #c87d3a; }
.badge-study { background: #e0f4e0; color: #5c8f5c; }
.badge-tag { background: #f3f0ec; color: var(--text-secondary); }

.idea-text {
  flex: 1;
  font-size: 0.92rem;
  line-height: 1.55;
}
.idea-date {
  font-size: 0.75rem;
  color: var(--text-secondary);
  flex-shrink: 0;
  align-self: center;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
  font-size: 0.9rem;
}
.empty-state .empty-icon {
  font-size: 2rem;
  margin-bottom: 8px;
  opacity: 0.5;
}
.empty-state p {
  margin: 0;
  line-height: 1.6;
}

/* kanban columns */
.kanban {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
  margin-top: 24px;
}

@media (max-width: 640px) {
  .kanban {
    grid-template-columns: 1fr;
    gap: 18px;
  }
}

.kanban-col {
  display: flex;
  flex-direction: column;
  min-height: 120px;
}
.kanban-col-title {
  font-size: 0.82rem;
  font-weight: 600;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  text-align: center;
  letter-spacing: 0.03em;
}
.kanban-col-title.todo {
  background: var(--amber-bg);
  color: var(--amber);
}
.kanban-col-title.doing {
  background: var(--blue-bg);
  color: var(--blue);
}
.kanban-col-title.done {
  background: var(--green-bg);
  color: var(--green);
}

.task-card {
  background: var(--card-bg);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  border-left: 3px solid #ccc;
  cursor: pointer;
  transition: all 0.25s ease;
  font-size: 0.88rem;
  animation: scaleIn 0.25s ease;
  position: relative;
}
.task-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-1px);
}
.task-card.status-todo { border-left-color: var(--amber); }
.task-card.status-doing { border-left-color: var(--blue); }
.task-card.status-done { border-left-color: var(--green); opacity: 0.7; }
.task-card .task-time {
  font-size: 0.7rem;
  color: var(--text-secondary);
  margin-top: 4px;
}

.add-task-row {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
.add-task-input {
  flex: 1;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-family: inherit;
  background: var(--card-bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.add-task-input:focus {
  border-color: var(--accent);
}
.add-task-input::placeholder {
  color: #c5bfb8;
}
.add-task-btn {
  padding: 9px 16px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: #FFF;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.add-task-btn:hover {
  background: #b8845e;
}
.add-task-btn:active {
  transform: scale(0.96);
}

/* Section divider */
.section-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 28px 0 20px;
}

/* Search */
.search-box {
  position: relative;
  margin-bottom: 18px;
}
.search-box .search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  font-size: 0.95rem;
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 11px 14px 11px 38px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-family: inherit;
  background: var(--card-bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus {
  border-color: var(--accent);
}
.search-input::placeholder {
  color: #c5bfb8;
}

/* Paper card */
.paper-card {
  margin-bottom: 10px;
}
.paper-card .paper-title {
  font-weight: 600;
  font-size: 0.92rem;
  margin-bottom: 4px;
}
.paper-card .paper-summary {
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.paper-card .paper-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  font-size: 0.75rem;
  color: var(--text-secondary);
}

.recommend-badge {
  display: inline-block;
  background: var(--accent-light);
  color: var(--accent);
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  margin-left: 4px;
}

/* Progress bars */
.progress-group {
  margin-bottom: 16px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.9rem;
  margin-bottom: 6px;
}
.progress-label .name {
  font-weight: 500;
}
.progress-label .stat {
  color: var(--text-secondary);
  font-size: 0.82rem;
}
.progress-bar {
  height: 10px;
  background: #EDE8E2;
  border-radius: 5px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  background: var(--accent);
}
.progress-fill.fill-blue { background: var(--blue); }
.progress-fill.fill-green { background: var(--green); }

/* Concept grid */
.concept-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.concept-tag {
  padding: 6px 14px;
  border-radius: 16px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
  color: var(--text);
  position: relative;
}
.concept-tag:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}
.concept-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #FFF;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.78rem;
  white-space: nowrap;
  z-index: 10;
  pointer-events: none;
  line-height: 1.5;
}
.concept-tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 5px solid transparent;
  border-top-color: var(--text);
}
.concept-tag.show-tooltip .concept-tooltip {
  display: block;
}

/* Resource links */
.resource-list {
  list-style: none;
}
.resource-list li {
  margin-bottom: 8px;
}
.resource-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--card-bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  text-decoration: none;
  color: var(--text);
  font-size: 0.88rem;
  transition: all 0.2s;
}
.resource-link:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow);
  transform: translateX(3px);
}
.resource-link .link-icon {
  opacity: 0.5;
}

/* Loading & cache info */
.cache-info {
  font-size: 0.72rem;
  color: var(--text-secondary);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Footer */
footer {
  text-align: center;
  padding: 32px 16px;
  color: var(--text-secondary);
  font-size: 0.78rem;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #FFF;
  padding: 10px 22px;
  border-radius: 20px;
  font-size: 0.85rem;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  z-index: 200;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<header>
  <h1>🍡 丸子工作流</h1>
  <p class="subtitle">灵感 · 选题 · 进度，一页搞定</p>
</header>

<nav class="tab-nav">
  <button class="tab-pill active" data-tab="tab-ideas">💡 灵感</button>
  <button class="tab-pill" data-tab="tab-papers">🔬 选题</button>
  <button class="tab-pill" data-tab="tab-dashboard">📊 进度</button>
</nav>

<div class="container">

<!-- ===== TAB 1: 灵感收件箱 + 日清单 ===== -->
<div class="tab-panel active" id="tab-ideas">

  <h2 class="section-title">💡 灵感收件箱</h2>
  <div class="cache-info" id="ideas-cache-info"></div>
  <div id="ideas-container"></div>

  <hr class="section-divider">

  <h2 class="section-title">📋 今日清单</h2>

  <div class="kanban">
    <!-- 待办 -->
    <div class="kanban-col">
      <div class="kanban-col-title todo">⏳ 待办</div>
      <div id="col-todo"></div>
      <div class="add-task-row">
        <input type="text" class="add-task-input" id="task-input" placeholder="写点什么…" maxlength="120">
        <button class="add-task-btn" id="task-add-btn">+</button>
      </div>
    </div>

    <!-- 进行中 -->
    <div class="kanban-col">
      <div class="kanban-col-title doing">🔄 进行中</div>
      <div id="col-doing"></div>
    </div>

    <!-- 完成 -->
    <div class="kanban-col">
      <div class="kanban-col-title done">✅ 完成</div>
      <div id="col-done"></div>
    </div>
  </div>
</div>

<!-- ===== TAB 2: 论文选题工坊 ===== -->
<div class="tab-panel" id="tab-papers">

  <h2 class="section-title">🔬 论文选题工坊</h2>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="paper-search" placeholder="输入关键词，搜研究方向…">
  </div>
  <div id="papers-results"></div>

  <hr class="section-divider">

  <h2 class="section-title">🎯 每日推荐</h2>
  <div id="papers-recommended"></div>
</div>

<!-- ===== TAB 3: 学习仪表盘 ===== -->
<div class="tab-panel" id="tab-dashboard">

  <h2 class="section-title">📊 学习进度</h2>

  <div class="progress-group">
    <div class="progress-label">
      <span class="name">🧠 TMS 学习</span>
      <span class="stat">4 / 8 课</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width: 50%;"></div>
    </div>
  </div>

  <div class="progress-group">
    <div class="progress-label">
      <span class="name">📝 IELTS 备考</span>
      <span class="stat">写作 Task 1 学习中</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill fill-blue" style="width: 35%;"></div>
    </div>
  </div>

  <div class="progress-group">
    <div class="progress-label">
      <span class="name">🚗 驾驶课</span>
      <span class="stat">0 / 4</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill fill-green" style="width: 0%;"></div>
    </div>
  </div>

  <hr class="section-divider">

  <h2 class="section-title">📚 已学概念</h2>
  <div class="concept-grid" id="concept-grid">
    <span class="concept-tag" data-def="运动诱发电位（Motor Evoked Potential），TMS刺激运动皮层后在对侧靶肌记录的电位反应。">MEP</span>
    <span class="concept-tag" data-def="皮质脊髓束（Corticospinal Tract），从大脑皮层到脊髓的主要运动传导通路。">皮质脊髓束</span>
    <span class="concept-tag" data-def="长时程增强（Long-Term Potentiation），突触传递效率的持续增强，被认为是学习和记忆的基础。">LTP</span>
    <span class="concept-tag" data-def="长时程抑制（Long-Term Depression），突触传递效率的持续减弱。">LTD</span>
    <span class="concept-tag" data-def="短间隔皮层内抑制（Short-Interval Intracortical Inhibition），成对脉冲TMS中反映GABA_A受体介导的抑制。">SICI</span>
    <span class="concept-tag" data-def="皮层内易化（Intracortical Facilitation），成对脉冲TMS中反映谷氨酸能兴奋性。">ICF</span>
    <span class="concept-tag" data-def="theta爆发式刺激（Theta Burst Stimulation），一种模式化rTMS方案，包括cTBS和iTBS。">TBS</span>
    <span class="concept-tag" data-def="神经系统根据经验和损伤进行结构和功能重组的能力。">神经可塑性</span>
    <span class="concept-tag" data-def="筋膜的协调中心（Centre of Coordination），FM手法中的关键触诊点。">筋膜CC点</span>
    <span class="concept-tag" data-def="AN-LU：前向上升螺旋（Anterio-Lateral Upward），筋膜的特定运动序列。">AN-LU</span>
    <span class="concept-tag" data-def="RE-LU：后向外上升螺旋（Retro-Lateral Upward），筋膜的特定运动序列。">RE-LU</span>
  </div>

  <hr class="section-divider">

  <h2 class="section-title">📖 学习资料</h2>
  <ul class="resource-list">
    <li><a href="#" class="resource-link"><span class="link-icon">📦</span> TMS 课程预习资源包</a></li>
    <li><a href="#" class="resource-link"><span class="link-icon">📘</span> 筋膜手法疾痛菜谱</a></li>
    <li><a href="#" class="resource-link"><span class="link-icon">📄</span> 运动控制综述论文库</a></li>
  </ul>
</div>

</div>

<footer>
  <p>丸子工作流 · 数据存本地，灵感永不失联</p>
</footer>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // ===================== localStorage keys =====================
  const LS_TASKS = 'wf_tasks';
  const LS_IDEAS = 'wf_ideas_cache';
  const LS_PAPERS = 'wf_papers_cache';

  // ===================== State =====================
  let tasks = [];
  let ideasCache = null;
  let papersCache = null;

  // ===================== DOM refs =====================
  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  // ===================== Toast =====================
  let toastTimer = null;
  function showToast(msg) {
    const el = $('#toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  // ===================== Tab switching =====================
  function switchTab(tabId) {
    $$('.tab-pill').forEach(p => p.classList.remove('active'));
    $$('.tab-panel').forEach(p => p.classList.remove('active'));
    const pill = document.querySelector(`[data-tab="${tabId}"]`);
    const panel = document.getElementById(tabId);
    if (pill) pill.classList.add('active');
    if (panel) panel.classList.add('active');
  }

  $$('.tab-pill').forEach(pill => {
    pill.addEventListener('click', () => switchTab(pill.dataset.tab));
  });

  // ===================== Tasks =====================
  function loadTasks() {
    try {
      const raw = localStorage.getItem(LS_TASKS);
      tasks = raw ? JSON.parse(raw) : [];
    } catch (e) {
      tasks = [];
    }
    if (!Array.isArray(tasks)) tasks = [];
  }

  function saveTasks() {
    localStorage.setItem(LS_TASKS, JSON.stringify(tasks));
  }

  function addTask(text) {
    if (!text.trim()) return;
    const task = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      text: text.trim(),
      status: 'todo',
      createdAt: new Date().toISOString()
    };
    tasks.push(task);
    saveTasks();
    renderTasks();
    showToast('已添加 ✨');
  }

  function cycleTaskStatus(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    if (task.status === 'todo') {
      task.status = 'doing';
    } else if (task.status === 'doing') {
      task.status = 'done';
    } else if (task.status === 'done') {
      // remove with confirmation feel: just delete
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      renderTasks();
      showToast('已移除 🗑️');
      return;
    }
    saveTasks();
    renderTasks();
    const labels = { doing: '进行中 🔄', done: '完成 ✅' };
    if (labels[task.status]) showToast(labels[task.status]);
  }

  function renderTasks() {
    const todoCol = $('#col-todo');
    const doingCol = $('#col-doing');
    const doneCol = $('#col-done');

    const todoTasks = tasks.filter(t => t.status === 'todo');
    const doingTasks = tasks.filter(t => t.status === 'doing');
    const doneTasks = tasks.filter(t => t.status === 'done');

    function fmtDate(iso) {
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, '0');
      return `${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function renderCol(col, items, status) {
      if (items.length === 0) {
        if (status === 'todo') {
          col.innerHTML = '<div class="empty-state" style="padding:20px 10px;"><p style="font-size:0.82rem;">今天还没有任务，点 + 添加</p></div>';
        } else {
          col.innerHTML = '<div class="empty-state" style="padding:20px 10px;min-height:40px;"></div>';
        }
      } else {
        col.innerHTML = items.map(t => `
          <div class="task-card status-${t.status}" data-id="${t.id}" title="点击切换状态">
            <div>${escHtml(t.text)}</div>
            <div class="task-time">${fmtDate(t.createdAt)}</div>
          </div>
        `).join('');
      }
    }

    renderCol(todoCol, todoTasks, 'todo');
    renderCol(doingCol, doingTasks, 'doing');
    renderCol(doneCol, doneTasks, 'done');

    // bind click events
    [todoCol, doingCol, doneCol].forEach(col => {
      col.querySelectorAll('.task-card').forEach(card => {
        card.addEventListener('click', () => cycleTaskStatus(card.dataset.id));
      });
    });
  }

  function escHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Task add button
  $('#task-add-btn').addEventListener('click', () => {
    const input = $('#task-input');
    addTask(input.value);
    input.value = '';
    input.focus();
  });
  $('#task-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const input = $('#task-input');
      addTask(input.value);
      input.value = '';
    }
  });

  // ===================== Ideas =====================
  function renderIdeas(ideas) {
    const container = $('#ideas-container');
    if (!ideas || ideas.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">💭</div>
          <p>灵感收件箱还是空的～<br>等数据文件上线后，这里会自动填充</p>
        </div>`;
      return;
    }
    container.innerHTML = ideas.map(idea => `
      <div class="card idea-card">
        <span class="badge badge-${(idea.category || '').toLowerCase()}">${escHtml(idea.category || '')}</span>
        <span class="idea-text">${escHtml(idea.text || '')}</span>
        <span class="idea-date">${escHtml(idea.date || '')}</span>
      </div>
    `).join('');
  }

  function loadIdeasFromGitHub() {
    fetch('workflow-ideas.json')
      .then(res => {
        if (!res.ok) throw new Error('not found');
        return res.json();
      })
      .then(data => {
        if (data && data.ideas) {
          localStorage.setItem(LS_IDEAS, JSON.stringify(data));
          ideasCache = data;
          renderIdeas(data.ideas);
          updateIdeasCacheInfo(data.updated, true);
        }
      })
      .catch(() => {
        // fallback to cache
        try {
          const cached = localStorage.getItem(LS_IDEAS);
          if (cached) {
            ideasCache = JSON.parse(cached);
            renderIdeas(ideasCache.ideas);
            updateIdeasCacheInfo(ideasCache.updated, false);
          } else {
            ideasCache = null;
            renderIdeas(null);
            updateIdeasCacheInfo(null, false);
          }
        } catch (e) {
          ideasCache = null;
          renderIdeas(null);
          updateIdeasCacheInfo(null, false);
        }
      });
  }

  function updateIdeasCacheInfo(updated, live) {
    const el = $('#ideas-cache-info');
    if (updated) {
      const label = live ? '已同步' : '离线缓存';
      el.textContent = `${label} · ${updated}`;
    } else {
      el.textContent = '';
    }
  }

  // ===================== Papers =====================
  function renderPapers(papers, containerId) {
    const container = document.getElementById(containerId);
    if (!papers || papers.length === 0) {
      const isRec = containerId === 'papers-recommended';
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${isRec ? '🎯' : '📄'}</div>
          <p>${isRec ? '今天的推荐还在路上…' : '还没有论文数据，等数据文件上线后就能搜啦'}</p>
        </div>`;
      return;
    }
    container.innerHTML = papers.map(p => `
      <div class="card paper-card">
        <div class="paper-title">${escHtml(p.title)}</div>
        ${p.summary ? `<div class="paper-summary">${escHtml(p.summary)}</div>` : ''}
        ${p.why ? `<div class="paper-summary" style="color:var(--accent);">💡 ${escHtml(p.why)}</div>` : ''}
        <div class="paper-meta">
          ${(p.tags || []).map(t => `<span class="badge badge-tag">${escHtml(t)}</span>`).join('')}
          ${p.date ? `<span>${escHtml(p.date)}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  function filterPapers(query) {
    if (!papersCache || !papersCache.papers) {
      $('#papers-results').innerHTML = '';
      return;
    }
    const q = query.trim().toLowerCase();
    if (!q) {
      $('#papers-results').innerHTML = '';
      return;
    }
    const filtered = papersCache.papers.filter(p => {
      return (p.title || '').toLowerCase().includes(q)
        || (p.summary || '').toLowerCase().includes(q)
        || (p.tags || []).some(t => t.toLowerCase().includes(q));
    });
    renderPapers(filtered, 'papers-results');
  }

  function loadPapersFromGitHub() {
    fetch('workflow-papers.json')
      .then(res => {
        if (!res.ok) throw new Error('not found');
        return res.json();
      })
      .then(data => {
        if (data) {
          localStorage.setItem(LS_PAPERS, JSON.stringify(data));
          papersCache = data;
          if (data.recommendations) {
            renderPapers(data.recommendations, 'papers-recommended');
          } else {
            renderPapers(null, 'papers-recommended');
          }
        }
      })
      .catch(() => {
        // fallback to cache
        try {
          const cached = localStorage.getItem(LS_PAPERS);
          if (cached) {
            papersCache = JSON.parse(cached);
            if (papersCache.recommendations) {
              renderPapers(papersCache.recommendations, 'papers-recommended');
            }
          } else {
            papersCache = null;
            renderPapers(null, 'papers-recommended');
          }
        } catch (e) {
          papersCache = null;
          renderPapers(null, 'papers-recommended');
        }
      });
  }

  // Paper search with debounce
  let searchTimer = null;
  $('#paper-search').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => filterPapers(e.target.value), 300);
  });

  // ===================== Concepts (Tab 3) =====================
  document.addEventListener('click', (e) => {
    // Close all tooltips when clicking elsewhere
    if (!e.target.classList.contains('concept-tag')) {
      $$('.concept-tag.show-tooltip').forEach(tag => tag.classList.remove('show-tooltip'));
    }
  });

  $$('.concept-tag').forEach(tag => {
    tag.addEventListener('click', (e) => {
      e.stopPropagation();
      // Toggle tooltip
      const wasShown = tag.classList.contains('show-tooltip');
      $$('.concept-tag.show-tooltip').forEach(t => t.classList.remove('show-tooltip'));
      if (!wasShown) {
        // Ensure tooltip element exists
        if (!tag.querySelector('.concept-tooltip')) {
          const def = tag.dataset.def || '';
          const tip = document.createElement('span');
          tip.className = 'concept-tooltip';
          tip.textContent = def;
          tag.appendChild(tip);
        }
        tag.classList.add('show-tooltip');
      }
    });
  });

  // Add tooltip spans to concept tags on load
  function initConceptTooltips() {
    $$('.concept-tag').forEach(tag => {
      if (!tag.querySelector('.concept-tooltip')) {
        const def = tag.dataset.def || '';
        const tip = document.createElement('span');
        tip.className = 'concept-tooltip';
        tip.textContent = def;
        tag.appendChild(tip);
      }
    });
  }

  // ===================== Init =====================
  function init() {
    loadTasks();
    renderTasks();
    loadIdeasFromGitHub();
    loadPapersFromGitHub();
    initConceptTooltips();
  }

  init();
})();
</script>

</body>
</html>
