<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丸子工作流</title>
<style>
:root {
  --bg: #FEF9F3;
  --pink: #E892A8;
  --pink-light: #F7D0D5;
  --pink-bg: #FDF2F4;
  --text: #4A3535;
  --text-light: #8B7B7B;
  --white: #FFFFFF;
  --shadow: 0 4px 20px rgba(0,0,0,0.06);
  --amber: #F0A060;
  --blue: #7BADD0;
  --green: #8CB896;
  --radius: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  background-image: radial-gradient(circle, rgba(232,146,168,0.10) 1px, transparent 1px);
  background-size: 40px 40px;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
}

.container { width: 100%; max-width: 680px; padding: 40px 20px 100px; }

/* ── Page Navigation ── */
.pages { position: relative; min-height: 400px; }
.page {
  display: none; flex-direction: column; gap: 28px;
  animation: fadeSlideIn 0.4s ease;
}
.page.active { display: flex; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Page Header ── */
.page-header { text-align: center; padding-bottom: 8px; }
.page-header .icon { font-size: 42px; margin-bottom: 8px; }
.page-header h2 { font-size: 1.4rem; font-weight: 600; color: #3A2A2A; }
.page-header p { font-size: 0.85rem; color: var(--text-light); margin-top: 4px; }

/* ── Cards ── */
.card {
  background: var(--white); border-radius: var(--radius);
  padding: 20px; box-shadow: var(--shadow);
}
.card-header { font-size: 0.9rem; font-weight: 600; color: var(--pink); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

/* ── Idea Cards (Tab 1) ── */
.idea-list { display: flex; flex-direction: column; gap: 10px; }
.idea-card {
  background: var(--white); border-radius: 10px; padding: 14px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; align-items: flex-start; gap: 12px;
  transition: transform 0.2s;
}
.idea-card:hover { transform: translateY(-1px); }
.idea-badge {
  padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 600;
  flex-shrink: 0; white-space: nowrap;
}
.badge-tms { background: #FFF3E0; color: #E65100; }
.badge-ielts { background: #E8F5E9; color: #2E7D32; }
.badge-学习 { background: #E3F2FD; color: #1565C0; }
.badge-生活 { background: #FCE4EC; color: #C62828; }
.idea-text { font-size: 0.9rem; line-height: 1.5; flex: 1; }
.idea-date { font-size: 0.7rem; color: var(--text-light); flex-shrink: 0; }

/* ── Task Columns (Tab 1 bottom) ── */
.task-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.task-col { display: flex; flex-direction: column; gap: 10px; }
.task-col-title {
  font-size: 0.78rem; font-weight: 600; padding: 8px 0;
  text-align: center; border-radius: 8px;
}
.col-todo .task-col-title { background: #FFF8E1; color: #E67E00; }
.col-doing .task-col-title { background: #E3F2FD; color: #2962A5; }
.col-done .task-col-title { background: #E8F5E9; color: #2E7D32; }

.task-card {
  background: var(--white); border-radius: 10px; padding: 12px 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04); font-size: 0.85rem;
  cursor: pointer; transition: all 0.2s; position: relative;
  border-left: 3px solid transparent;
}
.col-todo .task-card { border-left-color: var(--amber); }
.col-doing .task-card { border-left-color: var(--blue); }
.col-done .task-card { border-left-color: var(--green); text-decoration: line-through; color: var(--text-light); }
.task-card:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.08); }

.add-task {
  display: flex; gap: 8px; margin-top: 4px;
}
.add-task input {
  flex: 1; padding: 10px 14px; border: 2px dashed var(--pink-light);
  border-radius: 10px; background: transparent; font-size: 0.85rem; outline: none;
  font-family: inherit; transition: border-color 0.2s;
}
.add-task input:focus { border-color: var(--pink); }
.add-task button {
  padding: 10px 16px; background: var(--pink); color: white; border: none;
  border-radius: 10px; font-size: 0.85rem; cursor: pointer; font-weight: 600;
  transition: background 0.2s;
}
.add-task button:hover { background: #d47a90; }

.empty-hint { color: var(--text-light); font-size: 0.8rem; text-align: center; padding: 16px 0; }

/* ── Paper Search (Tab 2) ── */
.search-box {
  display: flex; align-items: center; gap: 10px;
  background: var(--white); border-radius: var(--radius); padding: 14px 18px;
  box-shadow: var(--shadow); margin-bottom: 16px;
}
.search-box input {
  flex: 1; border: none; outline: none; font-size: 0.95rem; font-family: inherit;
  color: var(--text);
}
.search-box input::placeholder { color: #C0B0B0; }
.search-icon { font-size: 1.2rem; }

.paper-list { display: flex; flex-direction: column; gap: 10px; }
.paper-card {
  background: var(--white); border-radius: 10px; padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: transform 0.2s;
  border-left: 3px solid var(--pink-light);
}
.paper-card:hover { transform: translateY(-1px); }
.paper-card h4 { font-size: 0.9rem; margin-bottom: 6px; color: #3A2A2A; }
.paper-card p { font-size: 0.8rem; color: var(--text-light); line-height: 1.5; }
.paper-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.paper-tag {
  padding: 2px 10px; border-radius: 10px; font-size: 0.7rem;
  background: var(--pink-bg); color: var(--pink);
}

/* ── Recommendations (Tab 2 bottom) ── */
.rec-card {
  background: linear-gradient(135deg, #FDF2F4, #FFF8F3);
  border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow);
  border: 1px solid var(--pink-light);
}
.rec-card h4 { font-size: 0.9rem; margin-bottom: 6px; }
.rec-card .rec-why { font-size: 0.8rem; color: var(--text-light); line-height: 1.5; font-style: italic; }

/* ── Progress Bars (Tab 3) ── */
.progress-list { display: flex; flex-direction: column; gap: 16px; }
.progress-item { display: flex; align-items: center; gap: 14px; }
.progress-label { font-size: 0.85rem; width: 100px; flex-shrink: 0; }
.progress-bar-wrap {
  flex: 1; height: 10px; background: #F0E8E8; border-radius: 10px; overflow: hidden;
}
.progress-bar-fill { height: 100%; background: var(--pink); border-radius: 10px; transition: width 0.6s ease; }
.progress-num { font-size: 0.8rem; color: var(--text-light); width: 40px; text-align: right; }

/* ── Concept Tags (Tab 3) ── */
.concept-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.concept-tag {
  padding: 8px 16px; border-radius: 20px; font-size: 0.8rem;
  background: var(--pink-bg); color: var(--pink); cursor: pointer;
  transition: all 0.2s; border: 1.5px solid transparent; position: relative;
}
.concept-tag:hover { background: var(--pink); color: white; }
.concept-tooltip {
  display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
  background: #3A2A2A; color: white; padding: 8px 14px; border-radius: 8px;
  font-size: 0.75rem; white-space: nowrap; max-width: 240px; z-index: 10;
}
.concept-tag:hover .concept-tooltip { display: block; }

/* ── Resource Links (Tab 3) ── */
.resource-list { display: flex; flex-direction: column; gap: 8px; }
.resource-link {
  display: flex; align-items: center; gap: 10px; padding: 14px 16px;
  background: var(--white); border-radius: 10px; text-decoration: none; color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04); transition: transform 0.2s;
}
.resource-link:hover { transform: translateY(-1px); }
.resource-link .link-emoji { font-size: 1.3rem; }

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; background: rgba(254,249,243,0.95);
  backdrop-filter: blur(12px); border-top: 1px solid #F0E8E8;
  display: flex; justify-content: center; align-items: center; gap: 20px;
  padding: 14px 20px; z-index: 100;
}
.nav-btn {
  padding: 10px 24px; border-radius: 24px; border: none;
  font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.nav-btn.prev { background: transparent; color: var(--text-light); }
.nav-btn.next { background: var(--pink); color: white; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-dots { display: flex; gap: 6px; }
.nav-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #E0D5D5;
  transition: all 0.3s;
}
.nav-dot.active { background: var(--pink); width: 24px; border-radius: 10px; }

/* ── Responsive ── */
@media (max-width: 480px) {
  .container { padding: 24px 16px 100px; }
  .task-grid { grid-template-columns: 1fr; }
  .progress-item { flex-wrap: wrap; }
  .progress-label { width: 80px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="pages">

    <!-- ═══════ PAGE 1: 灵感 + 日清单 ═══════ -->
    <div class="page active" data-page="0">
      <div class="page-header">
        <div class="icon">💡</div>
        <h2>灵感收件箱</h2>
        <p>从聊天中自动提炼的想法 & 日常任务看板</p>
      </div>

      <div class="card">
        <div class="card-header">✨ 最近灵感</div>
        <div class="idea-list" id="ideaList">
          <div class="empty-hint">加载中…</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">📋 今日清单</div>
        <div class="task-grid" id="taskGrid">
          <div class="task-col col-todo">
            <div class="task-col-title">待办</div>
            <div id="colTodo"></div>
            <div class="add-task">
              <input id="taskInput" placeholder="添加新任务…" onkeydown="if(event.key==='Enter')addTask()">
              <button onclick="addTask()">+</button>
            </div>
          </div>
          <div class="task-col col-doing">
            <div class="task-col-title">进行中</div>
            <div id="colDoing"></div>
          </div>
          <div class="task-col col-done">
            <div class="task-col-title">完成</div>
            <div id="colDone"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════ PAGE 2: 论文选题 ═══════ -->
    <div class="page" data-page="1">
      <div class="page-header">
        <div class="icon">🔬</div>
        <h2>论文选题工坊</h2>
        <p>搜索研究方向 & 每日灵感推荐</p>
      </div>

      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="paperSearch" placeholder="输入关键词，搜研究方向…" oninput="filterPapers()">
      </div>

      <div class="card">
        <div class="card-header">📄 论文</div>
        <div class="paper-list" id="paperList">
          <div class="empty-hint">输入关键词开始搜索…</div>
        </div>
      </div>

      <div class="card" style="background: transparent; box-shadow: none; padding: 0;">
        <div class="card-header">🎯 每日推荐</div>
        <div id="recList" style="display:flex;flex-direction:column;gap:12px;"></div>
      </div>
    </div>

    <!-- ═══════ PAGE 3: 学习仪表盘 ═══════ -->
    <div class="page" data-page="2">
      <div class="page-header">
        <div class="icon">📊</div>
        <h2>学习仪表盘</h2>
        <p>进度追踪 & 知识回顾</p>
      </div>

      <div class="card">
        <div class="card-header">📈 学习进度</div>
        <div class="progress-list">
          <div class="progress-item">
            <span class="progress-label">🧠 TMS 学习</span>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:50%"></div></div>
            <span class="progress-num">4/8</span>
          </div>
          <div class="progress-item">
            <span class="progress-label">📝 IELTS 备考</span>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:25%"></div></div>
            <span class="progress-num">1/4</span>
          </div>
          <div class="progress-item">
            <span class="progress-label">🚗 驾驶课</span>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:0%"></div></div>
            <span class="progress-num">0/4</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">📚 已学概念</div>
        <div class="concept-grid" id="conceptGrid"></div>
      </div>

      <div class="card">
        <div class="card-header">📖 学习资料</div>
        <div class="resource-list">
          <a href="#" class="resource-link"><span class="link-emoji">📦</span> TMS 课程预习资源包</a>
          <a href="#" class="resource-link"><span class="link-emoji">📘</span> 筋膜手法疾痛菜谱</a>
          <a href="#" class="resource-link"><span class="link-emoji">📄</span> 运动控制综述论文库</a>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <button class="nav-btn prev" id="btnPrev" onclick="goPage(-1)" disabled>← 上一页</button>
  <div class="nav-dots" id="navDots">
    <span class="nav-dot active"></span>
    <span class="nav-dot"></span>
    <span class="nav-dot"></span>
  </div>
  <button class="nav-btn next" id="btnNext" onclick="goPage(1)">下一页 →</button>
</nav>

<script>
// ═══════ PAGE NAVIGATION ═══════
let currentPage = 0; const totalPages = 3;
const pages = document.querySelectorAll('.page');
const dots = document.querySelectorAll('.nav-dot');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');

function goPage(dir) {
  const next = currentPage + dir;
  if (next < 0 || next >= totalPages) return;
  pages[currentPage].classList.remove('active');
  dots[currentPage].classList.remove('active');
  currentPage = next;
  pages[currentPage].classList.add('active');
  dots[currentPage].classList.add('active');
  btnPrev.disabled = currentPage === 0;
  btnNext.disabled = currentPage === totalPages - 1;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════ TASK DATA (localStorage) ═══════
let T = JSON.parse(localStorage.getItem('wf_tasks_v2') || '[]');
function saveT() { localStorage.setItem('wf_tasks_v2', JSON.stringify(T)); }

function addTask() {
  const inp = document.getElementById('taskInput');
  const text = inp.value.trim();
  if (!text) return;
  T.push({ id: Date.now().toString(), text, status: 'todo', at: new Date().toISOString() });
  inp.value = '';
  saveT(); renderTasks();
}

function cycleTask(id) {
  const t = T.find(x => x.id === id);
  if (!t) return;
  if (t.status === 'todo') t.status = 'doing';
  else if (t.status === 'doing') t.status = 'done';
  else { T = T.filter(x => x.id !== id); }
  saveT(); renderTasks();
}

function renderTasks() {
  const col = { todo: document.getElementById('colTodo'), doing: document.getElementById('colDoing'), done: document.getElementById('colDone') };

  for (const k of Object.keys(col)) {
    const items = T.filter(t => t.status === k);
    if (items.length === 0) {
      col[k].innerHTML = '<div class="empty-hint">' + ({ todo: '暂无待办', doing: '暂无任务', done: '暂无记录' })[k] + '</div>';
    } else {
      col[k].innerHTML = items.map(t =>
        `<div class="task-card" onclick="cycleTask('${t.id}')">${t.text}</div>`
      ).join('');
    }
  }
}

// ═══════ IDEAS (from JSON) ═══════
async function loadIdeas() {
  const list = document.getElementById('ideaList');
  try {
    const r = await fetch('workflow-ideas.json?t=' + Date.now());
    if (!r.ok) throw new Error('fetch failed');
    const data = await r.json();
    localStorage.setItem('wf_ideas_cache', JSON.stringify(data));
    renderIdeas(data.ideas);
  } catch {
    const cached = localStorage.getItem('wf_ideas_cache');
    if (cached) { renderIdeas(JSON.parse(cached).ideas); }
    else { list.innerHTML = '<div class="empty-hint">灵感数据加载中…</div>'; }
  }
}

function renderIdeas(ideas) {
  const list = document.getElementById('ideaList');
  if (!ideas || ideas.length === 0) {
    list.innerHTML = '<div class="empty-hint">还没有灵感，跟 Cola 聊聊就有了 ✨</div>';
    return;
  }
  list.innerHTML = ideas.map(i =>
    `<div class="idea-card">
      <span class="idea-badge badge-${(i.category||'生活').toLowerCase()}">${i.category}</span>
      <span class="idea-text">${i.text}</span>
      <span class="idea-date">${i.date}</span>
    </div>`
  ).join('');
}

// ═══════ PAPERS (from JSON) ═══════
let PapersData = { papers: [], recommendations: [] };

async function loadPapers() {
  try {
    const r = await fetch('workflow-papers.json?t=' + Date.now());
    if (!r.ok) throw new Error('fetch failed');
    PapersData = await r.json();
    localStorage.setItem('wf_papers_cache', JSON.stringify(PapersData));
  } catch {
    const cached = localStorage.getItem('wf_papers_cache');
    if (cached) PapersData = JSON.parse(cached);
  }
  filterPapers();
  renderRecs();
}

function filterPapers() {
  const q = (document.getElementById('paperSearch')?.value || '').toLowerCase().trim();
  const list = document.getElementById('paperList');
  if (!PapersData.papers) { list.innerHTML = '<div class="empty-hint">论文数据加载中…</div>'; return; }

  let filtered = PapersData.papers;
  if (q) {
    filtered = filtered.filter(p =>
      (p.title || '').toLowerCase().includes(q) ||
      (p.summary || '').toLowerCase().includes(q) ||
      (p.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-hint">' + (q ? '没有匹配的论文，试试别的关键词？' : '论文数据库加载中…') + '</div>';
    return;
  }
  list.innerHTML = filtered.map(p =>
    `<div class="paper-card">
      <h4>${p.title}</h4>
      <p>${p.summary}</p>
      <div class="paper-tags">${(p.tags||[]).map(t => `<span class="paper-tag">${t}</span>`).join('')}</div>
    </div>`
  ).join('');
}

function renderRecs() {
  const list = document.getElementById('recList');
  const recs = PapersData.recommendations || [];
  if (recs.length === 0) {
    list.innerHTML = '<div class="empty-hint" style="padding:20px">今天的推荐还在路上…</div>';
    return;
  }
  list.innerHTML = recs.map(r =>
    `<div class="rec-card">
      <h4>${r.title}</h4>
      <div class="paper-tags" style="margin:6px 0">${(r.tags||[]).map(t => `<span class="paper-tag">${t}</span>`).join('')}</div>
      <p class="rec-why">${r.why}</p>
    </div>`
  ).join('');
}

// ═══════ CONCEPTS ═══════
const concepts = [
  { name: 'MEP', def: '运动诱发电位——TMS刺激运动皮层后在靶肌肉记录到的电信号，反映皮质脊髓通路兴奋性。' },
  { name: '皮质脊髓束', def: '从运动皮层到脊髓运动神经元的直接通路，控制随意运动。' },
  { name: 'LTP', def: '长时程增强——突触传递效率的持久增强，是学习和记忆的细胞基础。' },
  { name: 'LTD', def: '长时程抑制——突触传递效率的持久减弱，与LTP共同调节神经可塑性。' },
  { name: 'SICI', def: '短间隔皮层内抑制——条件刺激后1-5ms的测试刺激MEP被抑制，反映GABA_A介导的抑制。' },
  { name: 'ICF', def: '皮层内易化——条件刺激后8-30ms的测试刺激MEP增强，反映谷氨酸能兴奋。' },
  { name: 'TBS', def: 'Theta爆发式刺激——模拟海马theta节律的TMS模式，iTBS增强、cTBS抑制皮层兴奋性。' },
  { name: '神经可塑性', def: '神经系统响应经验改变结构和功能的能力，是学习和康复的核心机制。' },
  { name: '筋膜CC点', def: '协调中心（Centre of Coordination）——意大利筋膜手法中的关键触诊和治疗点。' },
  { name: 'AN-LU', def: '前向序列-上肢（Ante-Latero Upper）——筋膜手法中的特定运动序列。' },
  { name: 'RE-LU', def: '后向序列-上肢（Retro-Latero Upper）——筋膜手法中的特定运动序列。' },
];

function renderConcepts() {
  document.getElementById('conceptGrid').innerHTML = concepts.map(c =>
    `<div class="concept-tag">
      ${c.name}
      <span class="concept-tooltip">${c.def}</span>
    </div>`
  ).join('');
}

// ═══════ INIT ═══════
renderTasks();
loadIdeas();
loadPapers();
renderConcepts();
</script>
</body>
</html>
