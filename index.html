<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丸子 · 工作流</title>
<style>
:root {
  --bg: #FAFAF8;
  --bg-warm: #F5F2EE;
  --text: #1A1A1A;
  --text-soft: #6B6B6B;
  --text-faint: #A0A0A0;
  --line: #E8E4DF;
  --accent: #B8A99A;
  --white: #FFFFFF;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: var(--bg); color: var(--text);
  font-weight: 300; line-height: 1.8;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  font-size: 17px;
}

body::before {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── Typography ── */
h2 { font-family: Georgia, 'Times New Roman', 'Noto Serif SC', serif; font-style: italic; font-weight: 400; font-size: 2.6rem; letter-spacing: -0.02em; line-height: 1.15; }
.section-label { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); }
.num { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--text-faint); text-transform: uppercase; }
.meta { font-size: 0.9rem; color: var(--text-soft); }

.container { width: 100%; max-width: 640px; padding: 60px 32px 40px; }

/* ── Pages ── */
.page { display: none; flex-direction: column; gap: 48px; }
.page.active { display: flex; animation: jumpIn 0.35s cubic-bezier(0.25, 0.8, 0.25, 1); }
@keyframes jumpIn { from{opacity:0;transform:scale(0.97);} to{opacity:1;transform:scale(1);} }

.page-header { margin-bottom: 0; }
.page-header .num { margin-bottom: 12px; }
.page-header p { font-size: 1.05rem; margin-top: 8px; }

/* ── Cards ── */
.card { background: var(--white); padding: 36px; border: 1px solid var(--line); margin-bottom: 2px; }
.card-label { font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 24px; }

/* ── Ideas ── */
.idea-item { display: flex; align-items: baseline; gap: 20px; padding: 18px 0; border-bottom: 1px solid var(--line); transition: padding-left 0.3s; }
.idea-item:hover { padding-left: 10px; }
.idea-cat { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); min-width: 52px; font-weight: 400; }
.idea-text { font-size: 1rem; flex: 1; line-height: 1.7; }
.idea-date { font-size: 0.75rem; color: var(--text-faint); white-space: nowrap; }

/* ── Tasks ── */
.task-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; }
.task-col { background: var(--bg-warm); padding: 24px 18px; }
.col-tag { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--line); }
.col-tag.todo { color: var(--text-faint); }
.col-tag.doing { color: var(--text-soft); }
.col-tag.done { color: var(--text-faint); }

.task-card { background: var(--white); padding: 14px 16px; margin-bottom: 8px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
.col-todo .task-card { border-left: 2px solid #D4C5B5; }
.col-doing .task-card { border-left: 2px solid #B8A99A; }
.col-done .task-card { border-left: 2px solid #E0D8D0; text-decoration: line-through; color: var(--text-faint); }
.task-card:hover { border-color: var(--line); transform: translateX(2px); }

.add-task { display: flex; gap: 6px; margin-top: 14px; }
.add-task input { flex:1; padding: 12px 14px; border: 1px solid var(--line); background: var(--white); font-size: 0.9rem; outline: none; font-family: inherit; transition: border-color 0.2s; }
.add-task input:focus { border-color: var(--accent); }
.add-task button { padding: 12px 18px; background: var(--text); color: white; border: none; font-size: 0.9rem; cursor: pointer; font-family: inherit; }

/* ── Search ── */
.search-wrap { display: flex; align-items: center; gap: 16px; background: var(--white); padding: 20px 24px; border: 1px solid var(--line); }
.search-wrap input { flex:1; border: none; outline: none; font-size: 1.05rem; font-family: inherit; color: var(--text); }
.search-wrap input::placeholder { color: var(--text-faint); }

/* ── Papers ── */
.paper-item { padding: 24px 0; border-bottom: 1px solid var(--line); transition: padding-left 0.3s; }
.paper-item:hover { padding-left: 10px; }
.paper-item h4 { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 1.1rem; font-weight: 400; margin-bottom: 6px; }
.paper-item p { font-size: 0.9rem; color: var(--text-soft); line-height: 1.7; }
.paper-tags { display: flex; gap: 16px; margin-top: 10px; }
.paper-tags span { font-size: 0.7rem; color: var(--text-faint); letter-spacing: 0.05em; }

/* ── Recommendations ── */
.rec-item { padding: 28px; border: 1px solid var(--line); margin-bottom: 2px; transition: padding-left 0.3s; }
.rec-item:hover { padding-left: 38px; }
.rec-item h4 { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 1.05rem; font-weight: 400; margin-bottom: 8px; }
.rec-item .why { font-size: 0.95rem; color: var(--text-soft); font-style: italic; line-height: 1.7; }

/* ── Progress ── */
.progress-row { display: flex; align-items: center; gap: 20px; padding: 16px 0; }
.progress-label { font-size: 0.95rem; width: 130px; flex-shrink: 0; }
.progress-track { flex:1; height: 3px; background: var(--line); }
.progress-fill { height: 100%; background: var(--text); transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }
.progress-num { font-size: 0.8rem; color: var(--text-faint); width: 36px; text-align: right; }

/* ── Concepts ── */
.concept-grid { display: flex; flex-wrap: wrap; gap: 2px; }
.concept-tag { padding: 10px 20px; font-size: 0.85rem; cursor: pointer; background: var(--bg-warm); transition: background 0.2s; position: relative; border: 1px solid transparent; }
.concept-tag:hover { background: var(--text); color: white; border-color: var(--text); }
.concept-tooltip { display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 12px 18px; font-size: 0.78rem; white-space: nowrap; max-width: 280px; z-index: 10; }
.concept-tag:hover .concept-tooltip { display: block; }

/* ── Resources ── */
.res-link { display: flex; align-items: center; gap: 14px; padding: 20px 0; border-bottom: 1px solid var(--line); text-decoration: none; color: var(--text); font-size: 0.95rem; transition: padding-left 0.3s; }
.res-link:hover { padding-left: 10px; }

/* ── Page Jump Buttons ── */
.jump-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.jump-btn { background: var(--text); color: white; border: none; padding: 14px 28px; font-size: 0.9rem; cursor: pointer; font-family: inherit; letter-spacing: 0.03em; transition: opacity 0.2s; }
.jump-btn:hover { opacity: 0.8; }
.jump-btn.ghost { background: transparent; color: var(--text-soft); border: 1px solid var(--line); }
.jump-dots { display: flex; gap: 8px; }
.jump-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--line); transition: all 0.3s; }
.jump-dot.active { background: var(--text); width: 20px; border-radius: 6px; }

/* ── Mobile ── */
@media (max-width: 480px) {
  body { font-size: 15px; }
  .container { padding: 40px 16px 40px; }
  h2 { font-size: 2rem; }
  .task-grid { grid-template-columns: 1fr; }
  .card { padding: 24px; }
}
</style>
</head>
<body>

<div class="container">

  <!-- ═══════ PAGE 1 ═══════ -->
  <div class="page active" data-page="0">
    <div class="page-header">
      <div class="num">01 — 03</div>
      <h2>Inbox</h2>
      <p>灵感收件箱 &amp; 今日清单</p>
    </div>

    <div class="card">
      <div class="card-label">最近灵感</div>
      <div class="idea-list" id="ideaList"><div class="meta" style="padding:16px 0;">加载中…</div></div>
    </div>

    <div class="card">
      <div class="card-label">今日清单</div>
      <div class="task-grid">
        <div class="task-col">
          <div class="col-tag todo">待办</div>
          <div id="colTodo"></div>
          <div class="add-task">
            <input id="taskInput" placeholder="添加任务…" onkeydown="if(event.key==='Enter')addTask()">
            <button onclick="addTask()">+</button>
          </div>
        </div>
        <div class="task-col">
          <div class="col-tag doing">进行中</div>
          <div id="colDoing"></div>
        </div>
        <div class="task-col">
          <div class="col-tag done">完成</div>
          <div id="colDone"></div>
        </div>
      </div>
    </div>

    <div class="jump-bar">
      <span></span>
      <button class="jump-btn" onclick="goPage(1)">选题工坊 →</button>
    </div>
  </div>

  <!-- ═══════ PAGE 2 ═══════ -->
  <div class="page" data-page="1">
    <div class="page-header">
      <div class="num">02 — 03</div>
      <h2>Research</h2>
      <p>论文选题工坊 &amp; 每日推荐</p>
    </div>

    <div class="search-wrap">
      <span style="font-size:1.2rem;">🔍</span>
      <input id="paperSearch" placeholder="输入关键词，搜索研究方向…" oninput="filterPapers()">
    </div>

    <div class="card">
      <div class="card-label">论文</div>
      <div class="paper-list" id="paperList"><div class="meta" style="padding:16px 0;">输入关键词开始搜索…</div></div>
    </div>

    <div class="card">
      <div class="card-label">每日推荐</div>
      <div id="recList"></div>
    </div>

    <div class="jump-bar">
      <button class="jump-btn ghost" onclick="goPage(0)">← 灵感</button>
      <button class="jump-btn" onclick="goPage(2)">学习进度 →</button>
    </div>
  </div>

  <!-- ═══════ PAGE 3 ═══════ -->
  <div class="page" data-page="2">
    <div class="page-header">
      <div class="num">03 — 03</div>
      <h2>Progress</h2>
      <p>学习仪表盘 &amp; 知识回顾</p>
    </div>

    <div class="card">
      <div class="card-label">学习进度</div>
      <div class="progress-row"><span class="progress-label">🧠 TMS 学习</span><div class="progress-track"><div class="progress-fill" style="width:50%"></div></div><span class="progress-num">4/8</span></div>
      <div class="progress-row"><span class="progress-label">📝 IELTS 备考</span><div class="progress-track"><div class="progress-fill" style="width:25%"></div></div><span class="progress-num">1/4</span></div>
      <div class="progress-row"><span class="progress-label">🚗 驾驶课</span><div class="progress-track"><div class="progress-fill" style="width:0%"></div></div><span class="progress-num">0/4</span></div>
    </div>

    <div class="card">
      <div class="card-label">已学概念</div>
      <div class="concept-grid" id="conceptGrid"></div>
    </div>

    <div class="card">
      <div class="card-label">学习资料</div>
      <a href="#" class="res-link">📦 TMS 课程预习资源包</a>
      <a href="#" class="res-link">📘 筋膜手法疾痛菜谱</a>
      <a href="#" class="res-link">📄 运动控制综述论文库</a>
    </div>

    <div class="jump-bar">
      <button class="jump-btn ghost" onclick="goPage(1)">← 选题</button>
      <span></span>
    </div>
  </div>

</div>

<script>
// ── Page nav ──
let cp=0; const TP=3;
function goPage(n){
  if(n<0||n>=TP)return;
  const pages=document.querySelectorAll('.page');
  pages[cp].classList.remove('active');
  cp=n; pages[cp].classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
}

// ── Tasks ──
let T=JSON.parse(localStorage.getItem('wf_v4')||'[]');
function sT(){localStorage.setItem('wf_v4',JSON.stringify(T));}
function addTask(){const v=document.getElementById('taskInput').value.trim();if(!v)return;T.push({id:Date.now().toString(),text:v,status:'todo',at:new Date().toISOString()});document.getElementById('taskInput').value='';sT();rT();}
function cyc(id){const t=T.find(x=>x.id===id);if(!t)return;if(t.status==='todo')t.status='doing';else if(t.status==='doing')t.status='done';else{T=T.filter(x=>x.id!==id);}sT();rT();}
function rT(){const c={todo:document.getElementById('colTodo'),doing:document.getElementById('colDoing'),done:document.getElementById('colDone')};for(const[k,el]of Object.entries(c)){const items=T.filter(t=>t.status===k);el.innerHTML=items.length?items.map(t=>`<div class="task-card" onclick="cyc('${t.id}')">${t.text}</div>`).join(''):`<div style="color:var(--text-faint);font-size:0.85rem;padding:8px 0;">—</div>`;}}

// ── Ideas ──
async function lI(){const el=document.getElementById('ideaList');try{const r=await fetch('workflow-ideas.json?t='+Date.now());if(!r.ok)throw 0;const d=await r.json();localStorage.setItem('wf_ic',JSON.stringify(d));rI(d.ideas);}catch{const c=localStorage.getItem('wf_ic');if(c)rI(JSON.parse(c).ideas);else el.innerHTML='<div class="meta" style="padding:16px 0;">还没有灵感 ✨</div>';}}
function rI(ideas){const el=document.getElementById('ideaList');if(!ideas||!ideas.length){el.innerHTML='<div class="meta" style="padding:16px 0;">还没有灵感，跟 Cola 聊聊就有了 ✨</div>';return;}el.innerHTML=ideas.map(i=>`<div class="idea-item"><span class="idea-cat">${i.category}</span><span class="idea-text">${i.text}</span><span class="idea-date">${i.date}</span></div>`).join('');}

// ── Papers ──
let PD={papers:[],recommendations:[]};
async function lP(){try{const r=await fetch('workflow-papers.json?t='+Date.now());if(!r.ok)throw 0;PD=await r.json();localStorage.setItem('wf_pc',JSON.stringify(PD));}catch{const c=localStorage.getItem('wf_pc');if(c)PD=JSON.parse(c);}fP();rR();}
function fP(){const q=(document.getElementById('paperSearch')?.value||'').toLowerCase().trim();const el=document.getElementById('paperList');if(!PD.papers){el.innerHTML='<div class="meta" style="padding:16px 0;">加载中…</div>';return;}let fl=PD.papers;if(q)fl=fl.filter(p=>(p.title||'').toLowerCase().includes(q)||(p.summary||'').toLowerCase().includes(q)||(p.tags||[]).some(t=>t.toLowerCase().includes(q)));if(!fl.length){el.innerHTML=`<div class="meta" style="padding:16px 0;">${q?'没有匹配的论文':'论文数据库加载中…'}</div>`;return;}el.innerHTML=fl.map(p=>`<div class="paper-item"><h4>${p.title}</h4><p>${p.summary}</p><div class="paper-tags">${(p.tags||[]).map(t=>'<span>'+t+'</span>').join('')}</div></div>`).join('');}
function rR(){const el=document.getElementById('recList');const rs=PD.recommendations||[];if(!rs.length){el.innerHTML='<div class="meta" style="padding:20px 0;">今天的推荐还在路上…</div>';return;}el.innerHTML=rs.map(r=>`<div class="rec-item"><h4>${r.title}</h4><div class="paper-tags" style="margin:8px 0">${(r.tags||[]).map(t=>'<span>'+t+'</span>').join('')}</div><p class="why">${r.why}</p></div>`).join('');}

// ── Concepts ──
const CN=[{n:'MEP',d:'运动诱发电位——TMS刺激运动皮层后在靶肌肉记录到的电信号。'},{n:'皮质脊髓束',d:'从运动皮层到脊髓运动神经元的直接通路。'},{n:'LTP',d:'长时程增强——突触传递效率的持久增强。'},{n:'LTD',d:'长时程抑制——突触传递效率的持久减弱。'},{n:'SICI',d:'短间隔皮层内抑制——反映GABA_A介导的皮层抑制。'},{n:'ICF',d:'皮层内易化——反映谷氨酸能兴奋性。'},{n:'TBS',d:'Theta爆发式刺激——iTBS增强、cTBS抑制皮层兴奋性。'},{n:'神经可塑性',d:'神经系统响应经验改变结构和功能的能力。'},{n:'筋膜CC点',d:'协调中心，意大利筋膜手法中的关键触诊点。'},{n:'AN-LU',d:'前向序列-上肢，筋膜手法特定运动序列。'},{n:'RE-LU',d:'后向序列-上肢，筋膜手法特定运动序列。'}];
function rC(){document.getElementById('conceptGrid').innerHTML=CN.map(c=>`<div class="concept-tag">${c.n}<span class="concept-tooltip">${c.d}</span></div>`).join('');}

// ── Init ──
rT();lI();lP();rC();
</script>
</body>
</html>
